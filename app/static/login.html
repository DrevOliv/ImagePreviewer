<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ImageViewer — Sign in</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="login-page">
  <main class="login-card">
    <div class="login-logo">IV</div>
    <h1>ImageViewer</h1>
    <p class="login-subtitle">Enter the viewer password to continue</p>
    <form id="login-form">
      <input
        id="password"
        name="password"
        type="password"
        placeholder="Password"
        autocomplete="current-password"
        autofocus
        required
      />
      <button type="submit">Sign in</button>
      <p id="error" class="login-error" role="alert"></p>
    </form>
  </main>
  <script src="/static/js/login.js"></script>
</body>
</html>
